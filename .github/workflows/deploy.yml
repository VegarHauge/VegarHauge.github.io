name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Use `npm install` instead of `npm ci` so a missing/stale
      # package-lock.json never silently breaks the build.
      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Push the built `dist/` folder to the `gh-pages` branch.
      # GitHub Pages must be configured to serve from that branch (root).
      # The CNAME file in public/ is copied to dist/ by Vite automatically,
      # which prevents GitHub from resetting the custom domain on each deploy.
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
